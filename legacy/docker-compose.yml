version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - TUSHARE_TOKEN=640b213ec19b805745b1cfebfaa923b60534389a43276302d065e623
      - DATABASE_PATH=/app/data/yzinvest.db
      - PORT=8080
      - ENVIRONMENT=production
      - SECRET_KEY=your-production-secret-key-change-this
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped