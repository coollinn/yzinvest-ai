name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-web.yml"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@9.15.3

      - run: pnpm install

      - name: Typecheck
        run: pnpm --filter @yzinvest/web typecheck

      - name: Build
        run: pnpm --filter @yzinvest/web build
        env:
          VITE_API_BASE: /api

      - name: Clean AppleDouble files from dist
        run: find apps/web/dist -name '._*' -delete && ls -la apps/web/dist/

      - name: Install wrangler
        run: npm install -g wrangler@3.114.17

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy apps/web/dist \
            --project-name=yzinvest-ai \
            --branch=${{ github.head_ref || github.ref_name }}
